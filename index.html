<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>女书密信 | Nüshu Secret Letter — 3·8 国际妇女节</title>
    <meta name="description" content="以女书「我」字为核心，探索女性社会地位的千年演变。为你的好友写一封女书密信。">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+Nushu&family=Noto+Serif+SC:wght@400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap"
        rel="stylesheet">
    <link rel="preload" href="fonts/NotoSansNushu-Regular.ttf" as="font" type="font/ttf" crossorigin>
    <link rel="preload" href="fonts/LiuyeTi.ttf" as="font" type="font/ttf" crossorigin>
    <link rel="stylesheet" href="css/style.css?v=2.6">
</head>

<body>
    <!-- Brand Logo removed -->

    <!-- ====== HOMEPAGE: 材质演变主页 ====== -->
    <main id="homepage" class="active">
        <!-- Hero: 女书「我」字 -->
        <section id="hero">
            <div id="hero-bg-canvas"></div>
            <div id="nushu-wo-container">
                <svg id="nushu-wo" viewBox="0 0 400 600" preserveAspectRatio="xMidYMid meet">
                    <!-- Three material zones clipping the character -->
                    <defs>
                        <!-- Silk texture pattern -->
                        <pattern id="silk-pattern" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
                            <rect width="20" height="20" fill="#f5e6d3" />
                            <line x1="0" y1="0" x2="20" y2="0" stroke="#d4b896" stroke-width="0.5" opacity="0.6" />
                            <line x1="0" y1="4" x2="20" y2="4" stroke="#c9a87c" stroke-width="0.3" opacity="0.4" />
                            <line x1="0" y1="8" x2="20" y2="8" stroke="#d4b896" stroke-width="0.5" opacity="0.6" />
                            <line x1="0" y1="12" x2="20" y2="12" stroke="#c9a87c" stroke-width="0.3" opacity="0.4" />
                            <line x1="0" y1="16" x2="20" y2="16" stroke="#d4b896" stroke-width="0.5" opacity="0.6" />
                            <line x1="0" y1="0" x2="0" y2="20" stroke="#bfa06a" stroke-width="0.3" opacity="0.3" />
                            <line x1="5" y1="0" x2="5" y2="20" stroke="#bfa06a" stroke-width="0.2" opacity="0.2" />
                            <line x1="10" y1="0" x2="10" y2="20" stroke="#bfa06a" stroke-width="0.3" opacity="0.3" />
                            <line x1="15" y1="0" x2="15" y2="20" stroke="#bfa06a" stroke-width="0.2" opacity="0.2" />
                        </pattern>
                        <!-- Ink gradient -->
                        <linearGradient id="ink-gradient" x1="0" y1="0" x2="1" y2="1">
                            <stop offset="0%" stop-color="#1a1a2e" />
                            <stop offset="50%" stop-color="#16213e" />
                            <stop offset="100%" stop-color="#0f3460" />
                        </linearGradient>
                        <!-- Modern fluid gradient -->
                        <linearGradient id="fluid-gradient" x1="0" y1="0" x2="1" y2="1">
                            <stop offset="0%" stop-color="#667eea" />
                            <stop offset="30%" stop-color="#764ba2" />
                            <stop offset="60%" stop-color="#f093fb" />
                            <stop offset="100%" stop-color="#4facfe" />
                        </linearGradient>
                        <!-- Clip for the Nüshu character shape -->
                        <clipPath id="wo-clip">
                            <!-- Approximate path for 𛈻 (我 in Nüshu) - a flowing curved character -->
                            <!-- This is a stylized calligraphic path -->
                            <path id="wo-path" d="
                M 200 50 
                C 180 60, 160 80, 155 110
                C 150 140, 160 160, 175 180
                C 185 195, 195 200, 200 210
                C 205 220, 195 240, 180 260
                C 165 280, 155 300, 160 320
                C 165 340, 180 355, 200 360
                C 220 365, 235 355, 240 340
                C 245 325, 240 305, 230 290
                C 220 275, 215 260, 220 245
                C 225 230, 240 220, 245 200
                C 250 180, 255 160, 250 140
                C 245 120, 235 100, 220 80
                C 210 65, 205 55, 200 50 Z
                M 170 120
                C 165 130, 170 145, 180 150
                L 195 155
                C 200 145, 195 130, 185 120
                Z
                M 210 140
                C 215 150, 225 155, 230 148
                C 235 140, 230 128, 220 125
                C 215 122, 210 130, 210 140 Z
              " />
                        </clipPath>
                    </defs>
                    <!-- Three material bands with the character shape -->
                    <g class="material-layers">
                        <!-- Silk zone (top 1/3) -->
                        <rect class="material-silk" x="80" y="20" width="240" height="200" fill="url(#silk-pattern)"
                            clip-path="url(#wo-clip)" />
                        <!-- Ink zone (middle 1/3) -->
                        <rect class="material-ink" x="80" y="180" width="240" height="200" fill="url(#ink-gradient)"
                            clip-path="url(#wo-clip)" />
                        <!-- Modern fluid zone (bottom 1/3) -->
                        <rect class="material-fluid" x="80" y="340" width="240" height="200" fill="url(#fluid-gradient)"
                            clip-path="url(#wo-clip)" />
                    </g>
                </svg>
                <!-- Fallback: render the actual Nüshu character with web font -->
                <div id="nushu-wo-text">𛆁</div>
            </div>
            <p id="hero-subtitle" class="fade-in-up">女书 · 密信</p>
            <p id="hero-desc" class="fade-in-up delay-1">为她写一封女书密信</p>
            <!-- CTA Button on first screen -->
            <button id="btn-write-letter-hero" class="cta-button fade-in-up delay-2" style="margin-top: 2rem;">
                <span class="btn-nushu">𛈬𛈻</span>
                <span class="btn-text">开始写信</span>
            </button>
            <div id="scroll-hint" class="fade-in-up delay-2">
                <span>↓ 向下滑动探索</span>
            </div>
        </section>

        <!-- Material Sections: expand on scroll -->


        <!-- CTA: Write a letter -->
        <section id="cta-section">
            <div class="cta-content">
                <h2>为她写一封女书密信</h2>
                <p>用千年秘密文字，传递只属于你们的心意</p>
                <button id="btn-write-letter" class="cta-button">
                    <span class="btn-nushu">𛈬𛈻</span>
                    <span class="btn-text">开始写信</span>
                </button>
            </div>
        </section>
    </main>

    <!-- ====== LETTER PAGE: 女书密信 ====== -->
    <main id="letter-page">
        <button id="btn-back-home" class="back-button">← 返回</button>

        <div id="letter-workspace">
            <!-- Left: Input -->
            <div id="letter-input-panel">
                <h2>写一封密信</h2>
                <p class="input-hint">
                    输入汉字，自动转码为古老的女书文字<br>
                    <span class="input-hint-note">
                        (注：女书流传久远，部分现代生僻字可能并无传记。如果某些字无法显现，信中会以“柳叶体”的形式展示出来。)
                    </span>
                    <textarea id="letter-input" placeholder=""></textarea>
                <div class="input-controls">
                    <div id="char-count"><span id="current-count">0</span> 字</div>
                    <div class="font-size-controls">
                        <label><input type="radio" name="font-size" value="1.6rem"> 小字</label>
                        <label><input type="radio" name="font-size" value="2.2rem" checked> 中字</label>
                        <label><input type="radio" name="font-size" value="2.8rem"> 大字</label>
                    </div>
                </div>
                <div class="theme-controls"
                    style="margin-top: 15px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap;">
                    <span style="font-size: 0.95rem; color: #6b7280; white-space: nowrap;">信纸花纹:</span>
                    <select id="theme-selector"
                        style="flex: 1; padding: 6px; border-radius: 6px; border: 1px solid #d1d5db; background: white; font-size: 0.95rem; cursor: pointer;">
                        <option value="style1" selected>青萝边框</option>
                        <option value="default">默认蓝底</option>
                        <option value="style2">浅色 (全幅图)</option>
                        <option value="custom">上传自定义信纸...</option>
                    </select>
                    <input type="file" id="custom-bg-upload" accept="image/*"
                        style="position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0, 0, 0, 0); border: 0;">

                    <span
                        style="font-size: 0.95rem; color: #6b7280; white-space: nowrap; margin-left: 5px;">文字颜色:</span>
                    <input type="color" id="text-color-picker" value="#fcefdc"
                        style="width: 32px; height: 32px; border: 1px solid #d1d5db; border-radius: 6px; cursor: pointer; padding: 0; background: none;">
                </div>
                <div id="missing-chars-warning" class="hidden"
                    style="color: #e57373; font-size: 0.85rem; margin-top: 1rem; text-align: left;">
                    以下生僻字在女书中无对应，已为您以柳叶体呈现：<br>
                    <span id="missing-chars-list"
                        style="color: #ff5252; font-weight: bold; font-family: 'LiuyeTi', serif; font-size: 1.2rem; letter-spacing: 2px;"></span>
                </div>
            </div>

            <!-- Right: Card Preview -->
            <div id="letter-preview-panel">
                <div id="letter-card-container">
                    <div id="letter-card" class="card-face-front">
                        <!-- Front Face -->
                        <div id="card-front" class="card-face">
                            <div class="card-ornament ornament-tl"></div>
                            <div class="card-ornament ornament-tr"></div>
                            <div class="card-ornament ornament-bl"></div>
                            <div class="card-ornament ornament-br"></div>

                            <!-- Style 1: Full Frame Overlay -->
                            <div id="card-frame-style1" class="hidden"></div>
                            <!-- Style 2 & Custom: Full Background Image -->
                            <div id="card-bg-style2" class="hidden"></div>
                            <div id="card-bg-custom" class="hidden"></div>

                            <!-- Text readability mask for custom backgrounds -->
                            <div id="card-bg-mask" class="hidden"></div>

                            <div id="octagon-bg"></div>
                            <div id="card-nushu-text"></div>
                            <!-- Shadow layer for flashlight decryption -->
                            <div id="shadow-layer" class="hidden"></div>
                        </div>
                        <!-- Back Face -->
                        <div id="card-back" class="card-face">
                            <div id="card-back-design">
                                <div class="back-nushu-char">𛆁</div>
                                <p class="back-label">女书 · 密信</p>
                                <p class="back-greeting"
                                    style="font-size: 0.8rem; color: #b58d55; margin-top: 6px; letter-spacing: 2px;">
                                    妇女节快乐</p>
                                <p class="back-date"></p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- NEW: Flashlight/Candle Icon & Explanation (Moved outside the card) -->
                <div id="candle-container">
                    <div id="candle-icon" title="点击蜡烛，明火照亮密信">
                        <svg viewBox="0 0 24 24" class="torch-svg" fill="none">
                            <!-- Candle stick -->
                            <rect x="9" y="10" width="6" height="12" fill="none" stroke="currentColor"
                                stroke-width="1.5" />
                            <!-- Dripping wax -->
                            <path d="M10 10 L10 14 Q10.5 15 11 14 L11 10" fill="currentColor" />
                            <!-- Wick -->
                            <line x1="12" y1="10" x2="12" y2="8" stroke="currentColor" stroke-width="1.5" />
                            <!-- Flame -->
                            <path d="M12 2 C10 4 10 6 12 8 C14 6 14 4 12 2 Z" fill="currentColor" stroke="currentColor"
                                stroke-width="0.5" />
                        </svg>
                    </div>
                    <p class="candle-hint">点燃烛火<br>解密古字</p>
                </div>

                <div id="card-actions">
                    <button id="btn-flip" class="action-btn">🔄 翻转卡片</button>
                    <button id="btn-save" class="action-btn primary">💾 保存图片</button>
                    <button id="btn-share" class="action-btn primary">🔗 复制分享链接</button>
                </div>

                <!-- View Mode CTAs -->
                <div id="view-mode-actions" class="hidden">
                    <button id="btn-write-own" class="action-btn cta-large">✍️ 我也要写密信</button>
                </div>
            </div>
        </div>

        <!-- Candlelight backdrop -->
        <div id="candlelight-backdrop" class="hidden"></div>
        <!-- Candlelight overlay -->
        <div id="candlelight-overlay" class="hidden">
            <div id="candle-cursor"></div>
            <button id="btn-exit-candle" class="exit-candle-btn">✕ 退出烛光模式</button>
        </div>
    </main>

    <!-- Save Image Overlay Modal -->
    <div id="save-modal-overlay" class="hidden">
        <div class="save-modal-content">
            <button id="save-modal-close" class="modal-close-btn">&times;</button>
            <p>长按下方图片保存到相册</p>
            <img id="save-modal-image" src="" alt="生成的密信">
        </div>
    </div>

    <script src="js/nushu-map.js?v=2.6"></script>
    <script src="js/main.js?v=2.6"></script>
    <script src="js/letter.js?v=2.6"></script>
</body>

</html>
